name: BeamAuth CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Soroban Smart Contract Tests + WASM Build
  # ──────────────────────────────────────────────────────────────────────────
  soroban-tests:
    name: "Soroban Contract Tests & Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32v1-none

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Verify Rust version
        run: |
          rustc --version
          echo "wasm32 target: $(rustup target list --installed | grep wasm32)"

      - name: Build WASM contracts (release)
        working-directory: contracts
        run: cargo build --target wasm32v1-none --release

      - name: Run Escrow Vault unit tests
        working-directory: contracts
        run: |
          cargo test -p escrow --verbose -- --nocapture 2>&1 | tee escrow-test-results.txt
          echo "Exit code: $?"

      - name: Run PasskeyWallet unit tests
        working-directory: contracts
        run: cargo test -p passkey-wallet --verbose -- --nocapture

      - name: Run Factory unit tests
        working-directory: contracts
        run: cargo test -p factory --verbose -- --nocapture

      - name: Run full workspace test suite
        working-directory: contracts
        run: |
          cargo test --workspace --verbose 2>&1 | tee workspace-test-results.txt
          echo "All contract tests: PASSED"

      - name: Verify WASM artifacts exist
        run: |
          find contracts/target/wasm32v1-none/release -name "*.wasm" | head -10
          echo "WASM build: SUCCESSFUL"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-wasm-contracts
          path: contracts/target/wasm32v1-none/release/*.wasm
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: contracts/*-test-results.txt

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Frontend Type Check + Lint + Build
  # ──────────────────────────────────────────────────────────────────────────
  frontend-checks:
    name: "Frontend TypeScript & Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint check
        run: npm run lint

      - name: Build production bundle
        run: npm run build
        env:
          # Provide dummy env vars so the build doesn't crash on missing secrets
          NEXT_PUBLIC_STELLAR_NETWORK:      testnet
          NEXT_PUBLIC_STELLAR_RPC_URL:      https://soroban-testnet.stellar.org
          NEXT_PUBLIC_ESCROW_CONTRACT_ID:   CPLACEHOLDER000000000000000000000000000000000000000000000
          NEXT_PUBLIC_FACTORY_CONTRACT_ID:  CPLACEHOLDER000000000000000000000000000000000000000000000
          NEXT_PUBLIC_NATIVE_ASSET_CONTRACT_ID: CDLZFC3SYJYDZT7K67VZ75HPJGWGNRLRHGBHSIM5CXJZYA4VUBOPETB2
          NEXT_PUBLIC_WEBAUTHN_RP_ID:       localhost
          NEXT_PUBLIC_WEBAUTHN_RP_NAME:     BeamAuth
          NEXT_PUBLIC_WEBAUTHN_ORIGIN:      http://localhost:3000
          RELAYER_SECRET_KEY:               SPLACEHOLDER0000000000000000000000000000000000000000000000

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Summary status check (required for branch protection)
  # ──────────────────────────────────────────────────────────────────────────
  ci-success:
    name: "CI Success Gate"
    needs: [soroban-tests, frontend-checks]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "soroban-tests: ${{ needs.soroban-tests.result }}"
          echo "frontend-checks: ${{ needs.frontend-checks.result }}"
          if [[ "${{ needs.soroban-tests.result }}" != "success" ]]; then
            echo "❌ Soroban tests failed"
            exit 1
          fi
          if [[ "${{ needs.frontend-checks.result }}" != "success" ]]; then
            echo "❌ Frontend checks failed"
            exit 1
          fi
          echo "✅ All CI checks passed — BeamAuth is healthy"
